-  title: "Gabriel Stoltz - What is computational statistical physics?"
   description: "Gabriel Stoltz, researcher at the Research center in applied mathematics (CERMICS), explains how his research in numerical statistical physics allows to understand what happens in regimes that are inaccessible to experiment, such as at the center of stars. \n\nFind out more on Ingenius, the digital magazine of École des Ponts ParisTech: ingenius.ecoledesponts.fr"
