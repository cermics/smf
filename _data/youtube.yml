   video: "https://www.youtube.com/watch?v=mEN5inPxwok"
-  title: "La dynamique moléculaire : un microscope numérique pour l’industrie"
   description: "Comment observer et comprendre le comportement de la matière à l'échelle atomique ? C'est le défi relevé par Régis Santet, durant sa thèse réalisée au sein du Centre d'Enseignement et de Recherche en Mathématiques et Calcul Scientifique (CERMICS). Dans ce nouvel épisode, il nous parle de ses travaux de recherche modélisant la matière au niveau atomique grâce à des simulations numériques sur ordinateur. Cette approche permet de voir au-delà des limites des microscopes traditionnels, offrant une alternative puissante et économique pour l’industrie ? À travers ce podcast, il revient également sur sa participation au concours « Ma thèse en 180 secondes » (pour savoir plus, interview de Régis Santet sur sa participation au concours (https://ingenius.ecoledesponts.fr/articles/ma-these-en-180-secondes-rencontre-avec-regis-santet/)).\n\n\nHébergé par Ausha. Visitez ausha.co/fr/politique-de-confidentialite pour plus d'informations."
   img: "https://i.ytimg.com/vi/I0PtC4KWbdU/maxresdefault.jpg"
   video: "https://www.youtube.com/watch?v=I0PtC4KWbdU"
-  title: "Les mathématiques pour mieux comprendre la matière"
   description: "Laurent Vidal est docteur en mathématique appliquée. Dans ce nouvel épisode, il nous parle de sa thèse qu'il a réalisé au Centre d'enseignement et de recherche en mathématiques et calcul scientifique. À l'interface entre la physique quantique et les mathématiques, il s'est intéressé tout particulièrement aux calculs de la structure électronique appliqués aux domaines de la chimie et de la physique.\nHébergé par Ausha. Visitez ausha.co/fr/politique-de-confidentialite pour plus d'informations."
   img: "https://i.ytimg.com/vi/J_ZS0TtI4CA/maxresdefault.jpg"
   video: "https://www.youtube.com/watch?v=J_ZS0TtI4CA"
-  title: "La mécanique quantique, un monde invisible à explorer"
   description: "Comment les électrons s’ordonnent-ils dans la matière ? C’est la question qui est au cœur des recherches d’Alfred Kirsch, chercheur en mathématiques appliquées au Centre d’Enseignement et de Recherche en Mathématiques et Calcul Scientifique (CERMICS). Dans ce podcast, il nous explique l’univers fascinant et déroutant de la mécanique quantique. Face à ces phénomènes qui défient les lois, il développe des outils mathématiques pour comprendre le comportement des électrons dans des matériaux complexes, comme les supraconducteurs. À travers ce podcast, Alfred évoque son engagement envers l’enseignement et la médiation scientifique.\n\n\nPour aller plus loin : \nDécouvrez son article La température, un phénomène physique complexe (https://ingenius.ecoledesponts.fr/articles/la-temperature-un-phenomene-physique-complexe/)\nLe projet ISEULT (https://www.cea.fr/presse/Pages/actualites-communiques/sante-sciences-du-vivant/premiere-mondiale-cerveau-devoile-comme-jamais-grace-irm-le-plus-puissant-monde.aspx)\nLe LHC  (https://home.cern/fr/science/accelerators/large-hadron-collider)(Grand collisionneur de hadrons)\nHébergé par Ausha. Visitez ausha.co/fr/politique-de-confidentialite pour plus d'informations."
