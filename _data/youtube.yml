-  title: "2024 Olympic Games: Sport and Science Teamed Up"
   description: "Science and sport have long been closely linked. Scientific innovation has contributed to the development of athletic performance, to the creation of a better and fairer sporting environment, and to the creation of sustainable infrastructures for competitions.\n\nHow can we optimize swimmers’ movements by using artificial intelligence and modeling? Can we predict the microbiological contamination of urban waters in order to use them for open water swimming? Is there a better format for football competitions ? As the 2024 Paris Olympics approach, researchers from the École des Ponts ParisTech will explain these questions and more:\n- Rémi Carmigniani, Researcher at Laboratoire d’Hydraulique Saint-Venant (LHSV)\n- Brigitte Vinçon-Leite, Researcher at Laboratoire Eau, Environnement et Systèmes Urbains (LEESU)\n- Arthur Guillot-Le Goff, PhD Student at Laboratoire Eau, Environnement et Systèmes Urbains (LEESU-LHSV)\n- Julien Guyon, Researcher at Centre d’Enseignement et de Recherche en Mathématiques et Calcul Scientifique (CERMICS)\n\nFor more information about the research topics of the speakers, you can visit Ingenius, the digital magazine of École des Ponts ParisTech:\n- Rémi Carmigniani : https://ingenius.ecoledesponts.fr/articles/le-projet-neptune-cest-quoi/ \n- Brigitte Vinçon-Leite & Arthur Guillot-Le Goff : https://ingenius.ecoledesponts.fr/articles/se-baigner-dans-la-seine-et-la-marne-bientot-une-realite/ \n- Julien Guyon : https://ingenius.ecoledesponts.fr/en/articles/using-mathematics-for-a-fairer-fifa-world-cup/"
