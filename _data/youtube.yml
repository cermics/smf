-  title: "Gabriel Stoltz - La physique statistique numérique, c'est quoi ?"
   description: "Gabriel Stoltz, chercheur au Centre d'Enseignement et de Recherche en Mathématiques et Calcul Scientifique (CERMICS), nous explique comment ses recherches en physique statistique numérique permettent de comprendre ce qui se passe dans des régimes inaccessibles à l'expérience, comme par exemple au centre des étoiles. \n\nRetrouvez d'autres contenus sur Ingenius, la revue numérique de l'École : ingenius.ecoledesponts.fr"
