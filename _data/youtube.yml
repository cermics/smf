-  title: "Retard de vol : et si l'IA trouvait la solution ?"
   description: "Dans cette vidéo tournée à l'occasion de la Fête de la Science 2025, Mathis Brichet, doctorant au Centre d'Enseignement et de Recherche en Mathématiques et Calcul Scientifique nous parle de ses recherches sur l'optimisation des réseaux de transport. \nRetards, pannes, conditions météorologiques... tous ces aléas compliquent la planification des transports. Son objectif ? Utiliser les mathématiques et l'intelligence artificielle pour proposer des solutions robustes capables de mieux gérer et anticiper les imprévus."
   img: "https://i.ytimg.com/vi/UCWSTKVLa-Y/maxresdefault.jpg"
   video: "https://www.youtube.com/watch?v=UCWSTKVLa-Y"
